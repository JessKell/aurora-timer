<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aurora Pomodoro</title>

<style>
:root{
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.6);
  --line:rgba(255,255,255,.14);
  --focus:rgba(122,231,199,.6);
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui,'Times New Roman', Times, serif;
  color:var(--text);
  transition:background .9s linear;
  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(122,231,199,.16), transparent 62%),
    radial-gradient(980px 680px at 75% 18%, rgba(140,160,255,.12), transparent 60%),
    radial-gradient(1200px 820px at 55% 88%, rgba(42,245,152,.08), transparent 60%),
    linear-gradient(180deg,#050c14,#091b2c);
  overflow:hidden;
}

/* Aurora Haze */
body::before{
  content:"";
  position:fixed;
  inset:-25%;
  pointer-events:none;
  opacity:.95;
  background:
    radial-gradient(1100px 620px at 20% 25%, rgba(42,245,152,.24), transparent 60%),
    radial-gradient(1200px 700px at 70% 25%, rgba(122,231,199,.20), transparent 62%),
    radial-gradient(1200px 760px at 55% 70%, rgba(140,160,255,.16), transparent 62%),
    radial-gradient(900px 520px at 30% 75%, rgba(255,80,200,.08), transparent 70%);
  filter: blur(26px) saturate(1.55);
  mix-blend-mode: screen;
  transform: translate3d(0,0,0);
  animation: auroraHaze 22s ease-in-out infinite alternate;
}

/* Aurora Bands */
body::after{
  content:"";
  position:fixed;
  inset:-30% -10% -25% -10%;
  pointer-events:none;
  opacity:.9;
  background:
    radial-gradient(1100px 240px at 22% 42%, rgba(42,245,152,.26), transparent 62%),
    radial-gradient(1200px 260px at 70% 46%, rgba(122,231,199,.22), transparent 64%),
    radial-gradient(1100px 240px at 45% 56%, rgba(140,160,255,.20), transparent 66%),
    radial-gradient(900px 220px at 55% 34%, rgba(255,80,200,.10), transparent 70%);
  filter: blur(16px) saturate(1.65);
  mix-blend-mode: screen;
  transform: translate3d(0,0,0);
  animation: auroraBands 28s ease-in-out infinite alternate;
}

@keyframes auroraHaze{
  0%   { transform: translate(-1.4%, -1.0%) scale(1.03); }
  50%  { transform: translate( 1.6%,  1.2%) scale(1.07); }
  100% { transform: translate(-1.0%,  1.6%) scale(1.04); }
}
@keyframes auroraBands{
  0%   { transform: translate(-2.5%, -1.8%) rotate(-2.2deg) scale(1.03); }
  50%  { transform: translate( 2.8%,  1.5%) rotate( 1.4deg) scale(1.09); }
  100% { transform: translate(-1.8%,  2.2%) rotate(-1.2deg) scale(1.05); }
}

/* Slight lift in last 20 seconds */
body.urgent::before{
  opacity:1;
  filter: blur(25px) saturate(1.65);
}
body.urgent::after{
  opacity:1;
  filter: blur(15px) saturate(1.75);
}

/* Finished */
body.finish::before{
  opacity:1;
  filter: blur(25px) saturate(1.70);
}
body.finish::after{
  opacity:1;
  filter: blur(15px) saturate(1.80);
}

/* Layout container: timer left, log right */
.shell{
  width:min(1040px, 92vw);
  display:grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 46px;
  align-items:start;
  position:relative;
  z-index:3;
  padding: 28px 22px 20px;
  margin-bottom: 260px;
}

@media (max-width: 860px){
  .shell{
    grid-template-columns: 1fr;
    gap: 120px;
    margin-bottom: 300px;
  }
}

/* Left: timer panel */
.left h1{
  margin:0 0 18px;
  font-size:22px;
  font-weight:650;
}

.task{
  width:100%;
  padding:12px 0;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--line);
  color:var(--text);
  outline:none;
  font-size:15px;
}
.task::placeholder{ color:var(--muted); }
.task:focus{ border-bottom-color:var(--focus); }

.timerRow{
  display:grid;
  grid-template-columns:52px 1fr 52px;
  align-items:center;
  gap:16px;
  margin:32px 0 22px;
}

.timer{
  text-align:center;
  font-size:76px;
  font-weight:750;
  letter-spacing:1px;
  padding:14px 0;
  will-change: transform;
}

/* Round +/- buttons */
.iconBtn{
  width:52px;
  height:52px;
  border-radius:50%;
  border:0px solid var(--line);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.15s;
}
.iconBtn:hover{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.25);
  transform:translateY(-1px) scale(1.03);
}
.iconBtn:active{ transform:scale(.96); }
.iconBtn:disabled{ opacity:.35; cursor:not-allowed; transform:none; }

.icon{ font-size:30px; font-weight:700; line-height:1; }

/* Center these buttons */
.controls{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:6px;
  flex-wrap:wrap;
}

.btn{
  padding:11px 18px;
  border-radius:0px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-size:14px;
  transition:.15s;
}
.btn:hover{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.25);
  transform:translateY(-1px);
}
.btn:active{ transform:scale(.97); }

.btnPrimary{ border-color:rgba(122,231,199,.55); }
.btnPrimary:hover{
  background:rgba(122,231,199,.10);
  border-color:rgba(122,231,199,.80);
}

/* Urgency: last 20 seconds — subtle */
.pulse{
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.012); }
}

/* Finish feedback */
.done{
  animation: finishGlow 1.8s ease 2;
}
@keyframes finishGlow{
  0%{ text-shadow:none; }
  50%{ text-shadow:0 0 10px rgba(122,231,199,.32); }
  100%{ text-shadow:none; }
}

/* Right: Today log */
.rightTop{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  margin-top: 4px;
}

.rightTitle{
  font-size:13px;
  color:rgba(255,255,255,.78);
  letter-spacing:.2px;
}

.rightTotal{
  font-size:13px;
  color:rgba(255,255,255,.78);
}

/* List */
.log{
  margin: 12px 0 0;
  padding:0;
  list-style:none;
  display:grid;
  gap:10px;
}

.logItem{
  padding:12px 12px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:0px;
  background: rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.logTask{
  color:rgba(255,255,255,.86);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width: 66%;
}

.logRight{
  display:flex;
  align-items:center;
  gap:10px;
  flex: 0 0 auto;
}

.logMeta{
  color:rgba(255,255,255,.62);
  font-size:12px;
  white-space:nowrap;
}

.logEmpty{
  opacity:.75;
}

/* Delete icon button per entry */
.deleteBtn{
  border:none;
  background:transparent;
  color:rgba(255,255,255,.55);
  cursor:pointer;
  font-size:18px;
  line-height:1;
  padding:4px 8px;
  border-radius:0px;
  transition:.15s;
}
.deleteBtn:hover{
  color:rgba(255,138,138,.95);
  background:rgba(255,255,255,.06);
}
.deleteBtn:active{
  transform: scale(.96);
}

/* Pines stay the same */
.pines{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height: 300px;
  z-index:1;
  pointer-events:none;
  opacity:.98;
}
.pines svg{ width:100%; height:100%; display:block; }
.pines .fade{ fill:url(#fade); }
</style>
</head>

<body>
  <div class="shell">
    <!-- LEFT: Timer -->
    <div class="left">
      <h1>Aurora Timer</h1>

      <input
        id="task"
        class="task"
        type="text"
        placeholder="In this session I'll be working on..."
        aria-label="Task for this Pomodoro"
        required
      />

      <div class="timerRow">
        <button id="minusBtn" class="iconBtn" aria-label="Subtract 5 minutes" title="- 5 min">
          <span class="icon">–</span>
        </button>

        <div id="timer" class="timer" aria-live="polite">25:00</div>

        <button id="plusBtn" class="iconBtn" aria-label="Add 5 minutes" title="+ 5 min">
          <span class="icon">+</span>
        </button>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn btnPrimary">Start</button>
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </div>

    <!-- RIGHT: Log -->
    <div class="right" aria-live="polite">
      <div class="rightTop">
        <div class="rightTitle">Today’s sessions</div>
        <div id="todayTotal" class="rightTotal">0 min</div>
      </div>

      <ul id="todayList" class="log" aria-label="Focus sessions completed today"></ul>
    </div>
  </div>

  <!-- Pine tree silhouette (unchanged) -->
  <div class="pines" aria-hidden="true">
    <svg viewBox="0 0 1200 260" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fade" x1="0" x2="0" y1="1" y2="0">
          <stop offset="0%" stop-color="#000" stop-opacity="1"/>
          <stop offset="100%" stop-color="#000" stop-opacity=".0"/>
        </linearGradient>
      </defs>

      <path class="fade" d="
        M0,260
        L0,160
        L30,190 L55,150 L75,190
        L95,140 L120,190
        L150,135 L175,190
        L205,145 L230,190
        L260,125  L290,190
        L320,150 L350,190
        L380,120  L410,190
        L440,140 L470,190
        L500,110  L530,190
        L560,145 L590,190
        L620,130 L650,190
        L680,150 L710,190
        L740,125  L770,190
        L800,140 L830,190
        L860,115  L890,190
        L920,150 L950,190
        L980,130 L1010,190
        L1040,145 L1070,190
        L1100,125 L1130,190
        L1160,140 L1185,190
        L1200,170
        L1200,260 Z" />

      <path d="
        M0,260 L0,205
        L40,225 L70,190 L95,228
        L140,182 L165,232
        L220,176 L245,236
        L300,170 L330,236
        L380,182 L405,240
        L470,168 L500,244
        L560,190 L590,244
        L650,180 L680,244
        L740,172 L770,244
        L830,182 L860,244
        L920,176 L950,244
        L1010,188 L1040,244
        L1100,176 L1130,244
        L1200,210 L1200,260 Z"
        fill="#000" opacity=".55"/>
    </svg>
  </div>

<script>
/* ---------- Timer ---------- */
const MIN = 5 * 60;
const MAX = 60 * 60;
const STEP = 5 * 60;

let total = 25 * 60;
let time = total;
let interval = null;

const timerEl = document.getElementById("timer");
const minusBtn = document.getElementById("minusBtn");
const plusBtn  = document.getElementById("plusBtn");
const bodyEl   = document.body;
const taskEl   = document.getElementById("task");

/* ---------- Storage (localStorage) ---------- */
const STORAGE_KEY = "auroraFocusLog_v1";

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function loadLog(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch{ return []; }
}

function saveLog(log){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
}

function minutesLabel(sec){
  const min = Math.round(sec / 60);
  return `${min} min`;
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function addSession({ task, seconds }){
  const cleanTask = (task || "").trim();
  if (!cleanTask) return;

  const entry = {
    id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
    date: todayKey(),
    task: cleanTask,
    seconds: seconds,
    at: Date.now()
  };

  const log = loadLog();
  log.push(entry);
  saveLog(log);
}

function removeSession(id){
  const log = loadLog();
  const filtered = log.filter(x => x.id !== id);
  saveLog(filtered);
  renderTodaySummary();
}

/* ---------- UI: Today list ---------- */
const todayTotalEl = document.getElementById("todayTotal");
const todayListEl  = document.getElementById("todayList");

function renderTodaySummary(){
  const log = loadLog();
  const today = todayKey();
  const todays = log
    .filter(x => x.date === today)
    .sort((a,b) => (b.at||0) - (a.at||0));

  const totalSeconds = todays.reduce((sum, x) => sum + (Number(x.seconds) || 0), 0);
  todayTotalEl.textContent = minutesLabel(totalSeconds);

  todayListEl.innerHTML = "";

  if (todays.length === 0){
    const li = document.createElement("li");
    li.className = "logItem logEmpty";
    li.innerHTML = `<span class="logTask">No sessions logged yet.</span><span class="logRight"><span class="logMeta">—</span></span>`;
    todayListEl.appendChild(li);
    return;
  }

  todays.forEach(entry => {
    const li = document.createElement("li");
    li.className = "logItem";

    const when = new Date(entry.at || Date.now());
    const hh = String(when.getHours()).padStart(2,"0");
    const mm = String(when.getMinutes()).padStart(2,"0");

    li.innerHTML = `
      <span class="logTask" title="${escapeHtml(entry.task)}">${escapeHtml(entry.task)}</span>
      <span class="logRight">
        <span class="logMeta">${minutesLabel(entry.seconds)} · ${hh}:${mm}</span>
        <button class="deleteBtn" type="button" data-id="${entry.id}" aria-label="Remove session" title="Remove">−</button>
      </span>
    `;
    todayListEl.appendChild(li);
  });
}

/* click handling for delete buttons */
todayListEl.addEventListener("click", (e) => {
  const btn = e.target.closest(".deleteBtn");
  if (!btn) return;
  removeSession(btn.dataset.id);
});

/* ---------- Visual background shift ---------- */
function aurora(p){
  const h1 = 155 + 95*p; // teal -> violet
  const h2 = 120 + 70*p; // green -> teal/blue
  const h3 = 215 + 34*p; // violet drift
  const glow = .12 + .14*p;

  bodyEl.style.background = `
    radial-gradient(1200px 800px at 20% 10%, hsla(${h2},95%,66%,${glow}), transparent 62%),
    radial-gradient(980px 680px at 75% 18%, hsla(${h3},95%,72%,${glow*.85}), transparent 60%),
    radial-gradient(1200px 820px at 55% 88%, hsla(${h1},95%,60%,${glow*.75}), transparent 60%),
    linear-gradient(180deg,#050c14,#091b2c)
  `;
}

/* ---------- Timer helpers ---------- */
function format(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function refresh(){
  timerEl.textContent = format(time);

  let p = 1 - (time/total);
  p = Math.max(0, Math.min(1, p));
  aurora(p);

  const running = Boolean(interval);
  minusBtn.disabled = running || time <= MIN;
  plusBtn.disabled  = running || time >= MAX;

  const urgent = running && time <= 20 && time > 0;
  timerEl.classList.toggle("pulse", urgent);
  bodyEl.classList.toggle("urgent", urgent);

  bodyEl.classList.toggle("finish", time === 0);
}

function tick(){
  if (time <= 0) { finish(); return; }
  time -= 1;
  refresh();
}

function start(){
  if (!taskEl.value.trim()){
    taskEl.setCustomValidity("Please enter what you’ll work on for this session.");
    taskEl.reportValidity();
    taskEl.focus();
    return;
  }
  taskEl.setCustomValidity("");

  if (interval) return;
  timerEl.classList.remove("done");
  interval = setInterval(tick, 1000);
  refresh();
}

function pause(){
  clearInterval(interval);
  interval = null;
  refresh();
}

function reset(){
  pause();
  time = total;
  timerEl.classList.remove("done");
  bodyEl.classList.remove("urgent","finish");
  refresh();
}

function finish(){
  pause();
  time = 0;
  timerEl.classList.remove("pulse");
  timerEl.classList.add("done");
  bodyEl.classList.remove("urgent");
  bodyEl.classList.add("finish");

  addSession({ task: taskEl.value, seconds: total });
  renderTodaySummary();

  refresh();
}

function adjust(dir){
  if (interval) return;
  time = Math.max(MIN, Math.min(MAX, time + dir*STEP));
  total = time;
  timerEl.classList.remove("done");
  bodyEl.classList.remove("finish");
  refresh();
}

/* ---------- Wire events ---------- */
minusBtn.onclick = () => adjust(-1);
plusBtn.onclick  = () => adjust(1);

document.getElementById("startBtn").onclick = start;
document.getElementById("pauseBtn").onclick = pause;
document.getElementById("resetBtn").onclick = reset;

taskEl.addEventListener("input", () => taskEl.setCustomValidity(""));

/* ---------- Init ---------- */
renderTodaySummary();
refresh();
</script>
</body>
</html>
